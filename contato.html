<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="novidades.html">Novidades</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contato</h1>
        <p>Entre em contato comigo através do formulário abaixo.</p>

        <section>
            <form action="mailto:sscaio@icloud.com" method="post" enctype="text/plain">
                
                <div>
                    <label for="nome">Nome:</label><br>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                </div>

                <div>
                    <label for="mensagem">Mensagem:</label><br>
                    <textarea id="mensagem" name="mensagem" rows="6" placeholder="Digite sua mensagem" required></textarea>
                </div>

                <button type="submit">Enviar</button>

            </form>
        </section>

        <section class="redes">
            <h2>Minhas redes</h2>
            <ul>
                <li><a href="https://www.linkedin.com/in/caio-sampaio-05500613a/" target="_blank">LinkedIn</a></li>
                <li><a href="https://github.com/sscaio-pt" target="_blank">GitHub</a></li>
                <li><a href="https://www.instagram.com/ssca1o/" target="_blank">Instagram</a></li>
            </ul>
        </section>

    </main>

    <footer>
        <p>© 2026 - Caio Sampaio</p>
    </footer>

</body>
</html>
